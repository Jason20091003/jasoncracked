<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jason 的工具箱</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 60px 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            margin-bottom: 60px;
        }
        
        header h1 {
            font-size: 48px;
            color: #fff;
            font-weight: 700;
            margin-bottom: 16px;
            text-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }
        
        header p {
            font-size: 20px;
            color: rgba(255,255,255,0.8);
        }
        
        .tools-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
        }
        
        .tool-card {
            background: rgba(255,255,255,0.95);
            border-radius: 24px;
            padding: 40px 30px;
            text-align: center;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-decoration: none;
            color: inherit;
            display: block;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        
        .tool-card:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 30px 60px rgba(0,0,0,0.2);
        }
        
        .tool-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 24px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
        }
        
        .tool-card:nth-child(1) .tool-icon {
            background: linear-gradient(135deg, #667eea, #764ba2);
        }
        
        .tool-card:nth-child(2) .tool-icon {
            background: linear-gradient(135deg, #f093fb, #f5576c);
        }
        
        .tool-card:nth-child(3) .tool-icon {
            background: linear-gradient(135deg, #4facfe, #00f2fe);
        }
        
        .tool-card:nth-child(4) .tool-icon {
            background: linear-gradient(135deg, #43e97b, #38f9d7);
        }
        
        /* 新增的每日答案卡片專用漸層（放在第一個位置時會自動套用原本的第一個漸層） */
        .tool-card:nth-child(5) .tool-icon {
            background: linear-gradient(135deg, #ff9a9e, #fad0c4);  /* 可自行調整顏色 */
        }
        
        .tool-name {
            font-size: 24px;
            font-weight: 700;
            color: #333;
            margin-bottom: 12px;
        }
        
        .tool-desc {
            font-size: 15px;
            color: #666;
            line-height: 1.6;
        }
        
        .tool-tag {
            display: inline-block;
            margin-top: 20px;
            padding: 8px 20px;
            background: #f0f0f0;
            border-radius: 20px;
            font-size: 13px;
            color: #888;
            font-weight: 500;
        }
        
        footer {
            text-align: center;
            margin-top: 80px;
            color: rgba(255,255,255,0.6);
            font-size: 14px;
        }
        
        @media (max-width: 768px) {
            header h1 {
                font-size: 36px;
            }
            
            header p {
                font-size: 16px;
            }
            
            .tools-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Jason 的工具箱</h1>
            <p>实用小工具集合，点击即可使用</p>
        </header>
        
        <div class="tools-grid">

            <!-- 新增：每日题目答案（放在最前面） -->
            <a href="daily-answer/" class="tool-card">
                <div class="tool-icon">📅</div>
                <div class="tool-name">AP每日题目答案</div>
                <div class="tool-desc">每天更新的题目参考答案</div>
                <span class="tool-tag">每日更新</span>
            </a>
            
            <!-- 詞典工具（原第一個） -->
            <a href="dict/" class="tool-card">
                <div class="tool-icon">📚</div>
                <div class="tool-name">JL 词典</div>
                <div class="tool-desc">英语词典，支持英译汉、音标显示和例句查询</div>
                <span class="tool-tag">翻译工具</span>
            </a>
            
            <!-- 人生清单 -->
            <a href="checklist/" class="tool-card">
                <div class="tool-icon">✅</div>
                <div class="tool-name">人生已完成清单</div>
                <div class="tool-desc">标记已完成的事项，支持自定义编辑</div>
                <span class="tool-tag">记录工具</span>
            </a>
            
            <!-- 性别预测 -->
            <a href="gender/" class="tool-card">
                <div class="tool-icon">🔮</div>
                <div class="tool-name">父母性别预测</div>
                <div class="tool-desc">通过科学算法预测父母性别</div>
                <span class="tool-tag">趣味游戏</span>
            </a>
            
            <!-- 基因解码器 -->
            <a href="dna/" class="tool-card">
                <div class="tool-icon">🧬</div>
                <div class="tool-name">生物DNA解码器</div>
                <div class="tool-desc">文本与 DNA 序列互转，支持二进制编码解码</div>
                <span class="tool-tag">编码工具</span>
            </a>

        </div>
        
        <footer>
            <p>Made with by Jason 版权所有 © 2026 JasonCracked工作室</p>
        </footer>
    </div>
</body>
</html>
